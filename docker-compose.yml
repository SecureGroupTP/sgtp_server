services:
  sgtp_chat:
    container_name: sgtp_chat
    build: .
    environment:
      SERVER_PORT: "${CHAT_PORT}"
      SHUTDOWN_TIMEOUT: "10s"
    ports:
      - "0.0.0.0:${CHAT_PORT}:${CHAT_PORT}"
    restart: unless-stopped
    init: true

  sgtp_voice:
    container_name: sgtp_voice
    build: .
    environment:
      SERVER_PORT: "${VOICE_PORT}"
      SHUTDOWN_TIMEOUT: "10s"
    ports:
      - "0.0.0.0:${VOICE_PORT}:${VOICE_PORT}"
    restart: unless-stopped
    init: true

  sgtp_userdir:
    container_name: sgtp_userdir
    build: .
    command: ["/usr/local/bin/sgtp-userdir"]
    depends_on:
      userdir_db:
        condition: service_healthy
    environment:
      SERVER_PORT: "${USER_PORT}"
      PG_DSN: "postgres://userdir:userdir@userdir_db:5432/userdir?sslmode=disable"
      PROFILE_TTL: "24h"
      AVATAR_MAX_BYTES: "33554432" # 32 MiB
      SEARCH_MAX_RESULTS: "20"
      CLEANUP_INTERVAL: "5m"
      SHUTDOWN_TIMEOUT: "10s"
    ports:
      - "0.0.0.0:${USER_PORT}:${USER_PORT}"
    restart: unless-stopped
    init: true

  userdir_db:
    container_name: userdir_db
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: "userdir"
      POSTGRES_USER: "userdir"
      POSTGRES_PASSWORD: "userdir"
    volumes:
      - userdir_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userdir -d userdir"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  userdir_db_data:
