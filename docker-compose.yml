services:
  sgtp_chat:
    container_name: sgtp_chat
    build: .
    depends_on:
      userdir_db:
        condition: service_healthy
    environment:
      # Legacy (still set for compatibility / defaults)
      SERVER_PORT: "${CHAT_TCP_PORT}"
      # Multi-transport (enable discovery by setting a non-zero port)
      BIND_HOST: "${BIND_HOST}"
      DISCOVERY_PORT: "${CHAT_DISCOVERY_PORT}"
      TCP_PORT: "${CHAT_TCP_PORT}"
      TCP_TLS_PORT: "${CHAT_TCP_TLS_PORT}"
      HTTP_PORT: "${CHAT_HTTP_PORT}"
      HTTP_TLS_PORT: "${CHAT_HTTP_TLS_PORT}"
      WS_PORT: "${CHAT_WS_PORT}"
      WS_TLS_PORT: "${CHAT_WS_TLS_PORT}"
      # HTTP tuning
      HTTP_RECV_TIMEOUT: "${HTTP_RECV_TIMEOUT}"
      HTTP_SEND_MAX_BYTES: "${HTTP_SEND_MAX_BYTES}"
      HTTP_SESSION_BUFFER_BYTES: "${HTTP_SESSION_BUFFER_BYTES}"
      HTTP_SESSION_TTL: "${HTTP_SESSION_TTL}"
      HTTP_SESSION_CLEANUP: "${HTTP_SESSION_CLEANUP}"
      SHUTDOWN_TIMEOUT: "10s"
      PG_DSN: "postgres://userdir:userdir@userdir_db:5432/userdir?sslmode=disable"
      AVATAR_MAX_BYTES: "33554432"
      SEARCH_MAX_RESULTS: "20"
      SUBSCRIBE_MAX: "500"
      CLEANUP_INTERVAL: "5m"
    ports:
      - "0.0.0.0:${CHAT_TCP_PORT}:${CHAT_TCP_PORT}"
      - "0.0.0.0:${CHAT_DISCOVERY_PORT}:${CHAT_DISCOVERY_PORT}"
      - "0.0.0.0:${CHAT_HTTP_PORT}:${CHAT_HTTP_PORT}"
      - "0.0.0.0:${CHAT_WS_PORT}:${CHAT_WS_PORT}"
    restart: unless-stopped
    init: true

  sgtp_voice:
    container_name: sgtp_voice
    build: .
    depends_on:
      userdir_db:
        condition: service_healthy
    environment:
      # Legacy (still set for compatibility / defaults)
      SERVER_PORT: "${VOICE_TCP_PORT}"
      # Multi-transport (enable discovery by setting a non-zero port)
      BIND_HOST: "${BIND_HOST}"
      DISCOVERY_PORT: "${VOICE_DISCOVERY_PORT}"
      TCP_PORT: "${VOICE_TCP_PORT}"
      TCP_TLS_PORT: "${VOICE_TCP_TLS_PORT}"
      HTTP_PORT: "${VOICE_HTTP_PORT}"
      HTTP_TLS_PORT: "${VOICE_HTTP_TLS_PORT}"
      WS_PORT: "${VOICE_WS_PORT}"
      WS_TLS_PORT: "${VOICE_WS_TLS_PORT}"
      # HTTP tuning
      HTTP_RECV_TIMEOUT: "${HTTP_RECV_TIMEOUT}"
      HTTP_SEND_MAX_BYTES: "${HTTP_SEND_MAX_BYTES}"
      HTTP_SESSION_BUFFER_BYTES: "${HTTP_SESSION_BUFFER_BYTES}"
      HTTP_SESSION_TTL: "${HTTP_SESSION_TTL}"
      HTTP_SESSION_CLEANUP: "${HTTP_SESSION_CLEANUP}"
      SHUTDOWN_TIMEOUT: "10s"
      PG_DSN: "postgres://userdir:userdir@userdir_db:5432/userdir?sslmode=disable"
      AVATAR_MAX_BYTES: "33554432"
      SEARCH_MAX_RESULTS: "20"
      SUBSCRIBE_MAX: "500"
      CLEANUP_INTERVAL: "5m"
    ports:
      - "0.0.0.0:${VOICE_TCP_PORT}:${VOICE_TCP_PORT}"
      - "0.0.0.0:${VOICE_DISCOVERY_PORT}:${VOICE_DISCOVERY_PORT}"
      - "0.0.0.0:${VOICE_HTTP_PORT}:${VOICE_HTTP_PORT}"
      - "0.0.0.0:${VOICE_WS_PORT}:${VOICE_WS_PORT}"
    restart: unless-stopped
    init: true

  userdir_db:
    container_name: userdir_db
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: "userdir"
      POSTGRES_USER: "userdir"
      POSTGRES_PASSWORD: "userdir"
    volumes:
      - userdir_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userdir -d userdir"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  userdir_db_data:
