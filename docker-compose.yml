services:
  flyway:
    container_name: sgtp_flyway
    image: flyway/flyway:11-alpine
    command:
      - -configFiles=/flyway/conf/flyway.conf
      - migrate
    depends_on:
      userdir_db:
        condition: service_healthy
    volumes:
      - "./db/migrations:/flyway/sql:ro"
      - "./db/flyway.conf:/flyway/conf/flyway.conf:ro"
    restart: "no"

  nginx:
    container_name: sgtp_nginx
    build:
      context: .
      dockerfile: deploy/nginx/Dockerfile
    depends_on:
      sgtp_chat:
        condition: service_started
    environment:
      NGINX_SERVER_NAME: "${NGINX_SERVER_NAME}"
      UPSTREAM_HOST: "sgtp_chat"
      UPSTREAM_PORT: "${CHAT_HTTP_PORT}"
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:443:443"
    volumes:
      - "./certbot/www:/var/www/certbot"
      - "./certbot/conf:/etc/letsencrypt"
    restart: unless-stopped
    init: true

  certbot:
    container_name: sgtp_certbot
    image: certbot/certbot:latest
    volumes:
      - "./certbot/www:/var/www/certbot"
      - "./certbot/conf:/etc/letsencrypt"

  sgtp_chat:
    container_name: sgtp_chat
    build: .
    depends_on:
      flyway:
        condition: service_completed_successfully
      userdir_db:
        condition: service_healthy
    environment:
      # Legacy (still set for compatibility / defaults)
      SERVER_PORT: "${CHAT_TCP_PORT}"
      # Multi-transport (enable discovery by setting a non-zero port)
      BIND_HOST: "${BIND_HOST}"
      TCP_PORT: "${CHAT_TCP_PORT}"
      TCP_TLS_PORT: "${CHAT_TCP_TLS_PORT}"
      HTTP_PORT: "${CHAT_HTTP_PORT}"
      HTTP_TLS_PORT: "${CHAT_HTTP_TLS_PORT}"
      WS_PORT: "${CHAT_WS_PORT}"
      WS_TLS_PORT: "${CHAT_WS_TLS_PORT}"
      ADVERTISE_TCP_PORT: "${ADVERTISE_TCP_PORT}"
      ADVERTISE_TCP_TLS_PORT: "${ADVERTISE_TCP_TLS_PORT}"
      ADVERTISE_HTTP_PORT: "${ADVERTISE_HTTP_PORT}"
      ADVERTISE_HTTP_TLS_PORT: "${ADVERTISE_HTTP_TLS_PORT}"
      ADVERTISE_WS_PORT: "${ADVERTISE_WS_PORT}"
      ADVERTISE_WS_TLS_PORT: "${ADVERTISE_WS_TLS_PORT}"
      TLS_CERT_FILE: "${TLS_CERT_FILE}"
      TLS_KEY_FILE: "${TLS_KEY_FILE}"
      # HTTP tuning
      HTTP_RECV_TIMEOUT: "${HTTP_RECV_TIMEOUT}"
      HTTP_SEND_MAX_BYTES: "${HTTP_SEND_MAX_BYTES}"
      HTTP_SESSION_BUFFER_BYTES: "${HTTP_SESSION_BUFFER_BYTES}"
      HTTP_SESSION_TTL: "${HTTP_SESSION_TTL}"
      HTTP_SESSION_CLEANUP: "${HTTP_SESSION_CLEANUP}"
      # Admin control plane
      ADMIN_JWT_SECRET: "${ADMIN_JWT_SECRET}"
      ADMIN_ACCESS_TTL: "${ADMIN_ACCESS_TTL}"
      ADMIN_REFRESH_TTL: "${ADMIN_REFRESH_TTL}"
      ADMIN_BOOTSTRAP_FILE: "${ADMIN_BOOTSTRAP_FILE}"
      SHUTDOWN_TIMEOUT: "10s"
      PG_DSN: "postgres://userdir:userdir@userdir_db:5432/userdir?sslmode=disable"
      AVATAR_MAX_BYTES: "33554432"
      SEARCH_MAX_RESULTS: "20"
      SUBSCRIBE_MAX: "500"
      CLEANUP_INTERVAL: "5m"
    ports:
      - "0.0.0.0:${CHAT_TCP_PORT}:${CHAT_TCP_PORT}"
      - "0.0.0.0:${CHAT_TCP_TLS_PORT}:${CHAT_TCP_TLS_PORT}"
    expose:
      - "${CHAT_HTTP_PORT}"
      - "${CHAT_WS_PORT}"
    volumes:
      - "./certs:/certs:ro"
      - "./certbot/conf:/etc/letsencrypt:ro"
    restart: unless-stopped
    init: true

  userdir_db:
    container_name: userdir_db
    image: postgres:16-alpine
    ports:
      - "127.0.0.1:5432:5432"
    environment:
      POSTGRES_DB: "userdir"
      POSTGRES_USER: "userdir"
      POSTGRES_PASSWORD: "userdir"
    volumes:
      - userdir_db_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U userdir -d userdir"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  userdir_db_data:
